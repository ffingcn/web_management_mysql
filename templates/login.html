<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">FFing - HomeDB</title>
    <link rel="icon" id="siteFavicon" type="image/png">
    <style>
        html {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            height: auto;
            display: flex;
            background: -webkit-linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1e293b 100%);
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1e293b 100%);
            position: relative;
            overflow: hidden;
            background-attachment: fixed;
        }

        .glass-box {
            position: absolute;
            background: rgba(100, 116, 139, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }
            25% {
                transform: translateY(-20px) rotate(2deg);
                opacity: 0.8;
            }
            50% {
                transform: translateY(-10px) rotate(-1deg);
                opacity: 0.5;
            }
            75% {
                transform: translateY(-25px) rotate(1deg);
                opacity: 0.7;
            }
        }

        .glass-box:nth-child(1) {
            width: 150px;
            height: 150px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .glass-box:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 20%;
            right: 15%;
            animation-delay: -2s;
        }

        .glass-box:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 20%;
            left: 20%;
            animation-delay: -4s;
        }

        .glass-box:nth-child(4) {
            width: 80px;
            height: 80px;
            bottom: 15%;
            right: 10%;
            animation-delay: -1.5s;
        }

        .glass-box:nth-child(5) {
            width: 60px;
            height: 60px;
            top: 50%;
            left: 5%;
            animation-delay: -3s;
        }

        .glass-box:nth-child(6) {
            width: 90px;
            height: 90px;
            top: 40%;
            right: 25%;
            animation-delay: -2.5s;
        }

        .glass-box:nth-child(7) {
            width: 70px;
            height: 70px;
            bottom: 30%;
            right: 30%;
            animation-delay: -4.5s;
        }

        .left-panel {
            flex: 2;
            background: transparent;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .animation-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: float 6s ease-in-out infinite;
        }

        .circle:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 0;
            left: 0;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 100px;
            right: 0;
            animation-delay: -2s;
        }

        .circle:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 50px;
            left: 50px;
            animation-delay: -4s;
        }

        .circle:nth-child(4) {
            width: 80px;
            height: 80px;
            top: 200px;
            left: 150px;
            animation-delay: -1s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.6;
            }
            25% {
                transform: translate(30px, -20px) scale(1.1);
                opacity: 0.8;
            }
            50% {
                transform: translate(-20px, 30px) scale(0.9);
                opacity: 0.5;
            }
            75% {
                transform: translate(20px, 20px) scale(1.05);
                opacity: 0.7;
            }
        }

        .floating-icon {
            position: absolute;
            font-size: 48px;
            color: rgba(255, 255, 255, 0.9);
            animation: iconFloat 4s ease-in-out infinite;
        }

        .floating-icon:nth-child(5) {
            top: 30px;
            right: 60px;
            animation-delay: 0s;
        }

        .floating-icon:nth-child(6) {
            bottom: 80px;
            right: 30px;
            animation-delay: -1.5s;
        }

        .floating-icon:nth-child(7) {
            top: 150px;
            left: 20px;
            animation-delay: -3s;
        }

        @keyframes iconFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
                opacity: 1;
            }
        }

        .logo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }

        .logo-text h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            opacity: 0.85;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.5), rgba(148, 163, 184, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 16px;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .right-panel {
            flex: 1;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(148, 163, 184, 0.15);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: transparent;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            overflow: hidden;
        }

        .login-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .login-title {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 14px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }

        .checkbox-group {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            color: #cbd5e1;
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            display: none;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(148, 163, 184, 0.4);
            border-radius: 4px;
            margin-right: 8px;
            position: relative;
            transition: all 0.2s ease;
            background: rgba(30, 41, 59, 0.5);
        }

        .checkbox-label input[type="checkbox"]:checked + .checkmark {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: #3b82f6;
        }

        .checkbox-label input[type="checkbox"]:checked + .checkmark::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .checkbox-label:hover .checkmark {
            border-color: #3b82f6;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message.show {
            display: block;
        }

        .lock-message {
            background: rgba(234, 179, 8, 0.15);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: #fcd34d;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .lock-message.show {
            display: block;
        }

        .countdown {
            color: #f59e0b;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .left-panel {
                min-height: 300px;
            }

            .animation-container {
                width: 250px;
                height: 250px;
            }

            .circle {
                transform: scale(0.7);
            }

            .logo-text h1 {
                font-size: 32px;
            }

            .login-container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="glass-box"></div>
    <div class="glass-box"></div>
    <div class="glass-box"></div>
    <div class="glass-box"></div>
    <div class="glass-box"></div>
    <div class="glass-box"></div>
    <div class="glass-box"></div>
    
    <div class="left-panel">
        <div class="logo-text">
            <h1 id="siteHeading">HomeDB</h1>
        </div>
    </div>
    
    <div class="right-panel">
        <div class="login-container">
            <div class="login-header">
                <div class="login-icon" id="loginIcon">🔐</div>
                <h2 class="login-title"></h2>
                <p class="login-subtitle"></p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="lockMessage" class="lock-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" name="username" required placeholder="请输入用户名" autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔑</span>
                        <input type="password" id="password" name="password" required placeholder="请输入密码" autocomplete="current-password">
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        <span>记住密码</span>
                    </label>
                </div>
                
                <button type="submit" id="loginBtn" class="btn-login">登录</button>
            </form>
            
            <div class="footer">
                <p class="footer-text">© 2024 FFing.cn. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/site-config');
                const config = await response.json();

                if (config.site && config.site.name) {
                    const siteName = config.site.name;
                    document.getElementById('siteTitle').textContent = siteName;
                    document.getElementById('siteHeading').textContent = siteName;
                }

                if (config.site && config.site.logo) {
                    document.getElementById('siteFavicon').href = config.site.logo;
                    
                    const loginIcon = document.getElementById('loginIcon');
                    loginIcon.innerHTML = `<img src="${config.site.logo}" alt="Logo">`;
                }
            } catch (error) {
                console.error('加载站点配置失败:', error);
            }
            
            // 加载保存的登录信息
            loadSavedCredentials();
        });

        // 加载保存的登录信息
        function loadSavedCredentials() {
            const savedData = localStorage.getItem('loginCredentials');
            if (savedData) {
                try {
                    const credentials = JSON.parse(savedData);
                    
                    document.getElementById('username').value = credentials.username || '';
                    document.getElementById('rememberMe').checked = credentials.rememberMe || false;
                    
                    // 如果勾选了记住密码，则填充密码
                    if (credentials.rememberMe) {
                        document.getElementById('password').value = credentials.password || '';
                    }
                } catch (error) {
                    console.error('加载登录信息失败:', error);
                }
            }
        }

        // 保存登录信息
        function saveCredentials(username, password) {
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (rememberMe) {
                const credentials = {
                    username: username,
                    password: password,
                    rememberMe: rememberMe
                };
                localStorage.setItem('loginCredentials', JSON.stringify(credentials));
            } else {
                // 如果未勾选记住密码，清除保存的信息
                localStorage.removeItem('loginCredentials');
            }
        }

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const lockMessage = document.getElementById('lockMessage');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            errorMessage.classList.remove('show');
            lockMessage.classList.remove('show');
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 登录成功后保存登录信息
                    saveCredentials(username, password);
                    window.location.href = '/';
                } else {
                    if (data.locked) {
                        lockMessage.innerHTML = data.message;
                        lockMessage.classList.add('show');
                        startCountdown(data.wait_seconds);
                    } else {
                        errorMessage.textContent = data.message;
                        errorMessage.classList.add('show');
                    }
                }
            } catch (error) {
                errorMessage.textContent = '登录请求失败，请稍后重试';
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });

        function startCountdown(seconds) {
            loginBtn.disabled = true;
            let remaining = seconds;
            
            const timer = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearInterval(timer);
                    lockMessage.classList.remove('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                } else {
                    loginBtn.textContent = `请等待 ${remaining} 秒`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
